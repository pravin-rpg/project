name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: documentqa
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 15432:5432

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      # We provide a dummy OpenAI key so the Spring ApplicationContext doesn't fail to start in tests.
      run: mvn -B package --file pom.xml
      env:
        SPRING_AI_OPENAI_API_KEY: sk-dummy-key-for-test-environments
