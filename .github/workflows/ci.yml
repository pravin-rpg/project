name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: documentqa
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 15432:5432

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      # We provide a dummy OpenAI key so the Spring ApplicationContext doesn't fail to start in tests.
      run: mvn -B package --file pom.xml
      env:
        SPRING_AI_OPENAI_API_KEY: sk-dummy-key-for-test-environments

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
    - name: Install dependencies
      run: npm ci
    - name: Build React App
      run: npm run build

  deploy-ec2:
    needs: [build, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          if [ ! -d "sde-app" ]; then
            git clone https://github.com/${{ github.repository }} sde-app
          fi
          cd sde-app
          git fetch origin main
          git reset --hard origin/main
          
          # Fix for "containerd.io : Conflicts: containerd" and crippled metadata.db
          sudo apt-get remove -y containerd docker.io runc || true
          sudo apt-get purge -y containerd docker.io runc || true
          sudo apt-get autoremove -y
          sudo apt-get update -y
          sudo apt-get install -y docker.io docker-compose-plugin
          
          # Force restart containerd and docker to fix "metadata.db: no such file"
          sudo systemctl stop docker || true
          sudo systemctl stop containerd || true
          sudo rm -rf /var/lib/containerd/io.containerd.snapshotter.v1.overlayfs/metadata.db || true
          sudo systemctl start containerd
          sudo systemctl start docker
          
          # Set permissions if needed
          sudo usermod -aG docker $USER || true
          
          # Start the stack
          sudo docker compose down || true
          sudo docker compose up -d --build