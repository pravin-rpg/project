version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: documentqa-postgres
    environment:
      POSTGRES_DB: documentqa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: