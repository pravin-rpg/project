spring.application.name=demo
# ==================== Server ====================
server.port=8081

# ==================== OpenAI ====================
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-dummy-key}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.embedding.options.model=text-embedding-3-small

# ==================== File Upload ====================
app.upload.dir=uploads

# ==================== PostgreSQL + PGVector (FIXED) ====================
spring.datasource.url=jdbc:postgresql://localhost:15432/documentqa
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver




spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE     
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.schema-name=public
spring.ai.vectorstore.pgvector.table-name=vector_store
spring.ai.vectorstore.pgvector.initialize-schema=true

# Docker Compose (disabled - manage Docker manually with: docker compose up -d)
spring.docker.compose.enabled=false

# Logging (helps debugging)
logging.level.org.springframework.ai=DEBUG

spring.ai.openai.audio.transcription.options.model=whisper-1
spring.ai.openai.audio.transcription.options.response-format=srt
spring.ai.openai.audio.transcription.options.temperature=0

app.allowed.audio-types=audio/mpeg,audio/wav,audio/mp4,video/mp4,video/quicktime